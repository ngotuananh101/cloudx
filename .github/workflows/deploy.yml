name: deploy

on:
  push:
    branches:
      - main
      - master
      - develop
      - workos
  pull_request:
    branches:
      - main
      - master
      - develop
      - workos
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true


jobs:
  # ─── 1. Run Tests ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node & pnpm
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11.12.0 --ignore-scripts

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Copy env & Generate key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build assets
        run: pnpm run build

      - name: Run tests
        run: ./vendor/bin/pest

  # ─── 2. Run Lint ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.4'

      - name: Setup Node & pnpm
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11.12.0 --ignore-scripts

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Pint
        run: composer lint

      - name: Format Frontend
        run: pnpm run format

      - name: Lint Frontend
        run: pnpm run lint

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore: fix code style"
          commit_options: '--no-verify'

  # ─── 3. Build and Deploy ────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Pull the latest commit in case the linter pushed changes
          ref: ${{ github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node & pnpm
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11.12.0 --ignore-scripts

      - name: Install production dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Build frontend assets
        env:
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          VITE_PUSHER_HOST: ${{ vars.VITE_PUSHER_HOST }}
          VITE_PUSHER_PORT: ${{ vars.VITE_PUSHER_PORT }}
          VITE_PUSHER_SCHEME: ${{ vars.VITE_PUSHER_SCHEME }}
          VITE_PUSHER_APP_KEY: ${{ vars.VITE_PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ vars.VITE_PUSHER_APP_CLUSTER }}
        run: pnpm run build

      - name: Sync files to server via rsync
        uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-avzr --delete --no-o --no-g'
          SOURCE: './'
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          TARGET: ${{ secrets.DEPLOY_PATH }}
          # Exclude files/folders that shouldn't be overridden or uploaded
          EXCLUDE: '/.git/, /.github/, /node_modules/, /tests/, /.env, /storage/, /deploy.sh, /.user.ini, /.htaccess, /public/.user.ini, /docs/'

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            # Ensure required storage and bootstrap cache directories exist
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            chmod -R 775 storage bootstrap/cache || true

            # Enable maintenance mode
            php artisan down --retry=30 --refresh=15 || true

            # Run migrations
            php artisan migrate --force

            # Optimize caches
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Restart queue & storage link
            php artisan storage:link || true
            php artisan queue:restart || true


            # Fix ownership and permissions
            chown -R www:www . || true
            chmod -R 775 storage bootstrap/cache || true

            # Disable maintenance mode
            php artisan up || true

      - name: Notify success
        if: success()
        run: echo "✅ Deployed to production successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deploy failed — check the logs above"
